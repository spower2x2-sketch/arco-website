أيوه معاك حق، اللي ظاهر ده مجرد Hero Section بس، مش الويب سايت الكامل اللي اتكلمنا عليه.<!-- CINEMATIC HERO -->

<section class="hero">

<div class="hero-overlay"></div>

<div class="hero-gradient"></div>

<div class="hero-content">

<p class="mini">
ITALIAN LUXURY EXPERIENCE
</p>

<h1 class="hero-title">
ARCO
</h1>

<p class="hero-desc">

A cinematic Italian destination crafted for timeless evenings,
warm atmosphere,
and unforgettable experiences.

</p>

<div class="hero-buttons">

<a href="#experience" class="lux-btn primary-btn">
Explore Experience
</a>

<a href="#booking" class="lux-btn secondary-btn">
Reserve Now
</a>

</div>

<div class="scroll-line"></div>

</div>

</section>

<style>

/* HERO */

.hero{

position:relative;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

text-align:center;

overflow:hidden;
}

/* BACKGROUND */

.hero::before{

content:'';

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.82)
),

url('https://i.postimg.cc/htzVLJQC/E0522A18-8842-4E2C-A7AA-835F15D18C68.png');

background-size:cover;
background-position:center;

transform:scale(1.05);

animation:bgZoom 18s ease-in-out infinite alternate;

z-index:-5;
}

@keyframes bgZoom{

from{
transform:scale(1.05);
}

to{
transform:scale(1.12);
}

}

/* GOLD GLOW */

.hero-gradient{

position:absolute;

width:700px;
height:700px;

background:
radial-gradient(circle,
rgba(217,178,124,.12),
transparent 70%);

filter:blur(90px);

animation:pulse 6s infinite alternate;

z-index:-3;
}

@keyframes pulse{

from{
transform:scale(1);
}

to{
transform:scale(1.15);
}

}

/* CONTENT */

.hero-content{

max-width:1100px;

padding:20px;

animation:heroReveal 2s ease;
}

@keyframes heroReveal{

from{
opacity:0;
transform:translateY(60px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.mini{

letter-spacing:8px;

font-size:13px;

margin-bottom:25px;

color:#d9b27c;
}

.hero-title{

font-size:180px;

font-family:'Cinzel',serif;

font-weight:600;

letter-spacing:30px;

line-height:.9;

margin-bottom:35px;

color:white;

text-shadow:
0 0 50px rgba(217,178,124,.25);
}

.hero-desc{

max-width:850px;

margin:auto;

font-size:28px;

line-height:2;

color:#ead7ba;

margin-bottom:55px;
}

/* BUTTONS */

.hero-buttons{

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;
}

.lux-btn{

padding:22px 48px;

border-radius:100px;

font-size:17px;

font-weight:600;

text-decoration:none;

position:relative;

overflow:hidden;

transition:.5s;
}

.lux-btn::before{

content:'';

position:absolute;

top:0;
left:-120%;

width:100%;
height:100%;

background:
linear-gradient(
120deg,
transparent,
rgba(255,255,255,.35),
transparent);

transition:.8s;
}

.lux-btn:hover::before{

left:120%;
}

.primary-btn{

background:
linear-gradient(90deg,#b88746,#f1d4a0);

color:black;
}

.secondary-btn{

background:rgba(255,255,255,.05);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.08);

color:white;
}

.lux-btn:hover{

transform:translateY(-7px);

box-shadow:
0 0 40px rgba(217,178,124,.25);
}

/* SCROLL LINE */

.scroll-line{

width:2px;
height:90px;

margin:70px auto 0;

background:
linear-gradient(
to bottom,
#d9b27c,
transparent);

animation:scrollMove 2s infinite;
}

@keyframes scrollMove{

50%{
transform:translateY(14px);
opacity:.5;
}

}

/* MOBILE */

@media(max-width:950px){

.hero-title{

font-size:95px;

letter-spacing:12px;
}

.hero-desc{

font-size:22px;

line-height:1.8;
}

.mini{

font-size:11px;
}

.lux-btn{

width:100%;
}

}

</style>
